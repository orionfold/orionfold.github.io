name: Deploy to GitHub Pages

on:
  # The flip (S12): Pages source is now GitHub Actions, so every push to main
  # rebuilds and deploys the Astro site in dist/. workflow_dispatch stays for
  # manual re-runs.
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium for browser regressions
        run: npx playwright install --with-deps chromium

      - name: Test server and commerce contracts
        run: npm run test:deno

      - name: Build site
        run: npm run build

      - name: Test source and rendered-output contracts
        run: npm run test:node

      - name: Test critical browser journeys
        run: npm run test:e2e

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      # D2: purge the Cloudflare edge cache so a fresh deploy is never served
      # stale. HTML is already DYNAMIC (uncached) and /_astro/* is fingerprinted,
      # so this mainly refreshes the stable-URL assets (OG images, sitemap,
      # robots.txt, llms.txt, favicon). Uses a purge-ONLY scoped token. Fail-safe:
      # if the secret is not set (e.g. on a fork), the step skips cleanly instead
      # of failing the deploy.
      - name: Purge Cloudflare cache
        env:
          CF_PURGE_TOKEN: ${{ secrets.CLOUDFLARE_PURGE_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          if [ -z "$CF_PURGE_TOKEN" ] || [ -z "$CF_ZONE_ID" ]; then
            echo "Cloudflare purge secrets not set — skipping cache purge."
            exit 0
          fi
          echo "Purging Cloudflare cache for zone $CF_ZONE_ID"
          resp=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CF_PURGE_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')
          echo "$resp"
          echo "$resp" | grep -q '"success":true' || {
            echo "::warning::Cloudflare purge did not report success (deploy still succeeded)."
            exit 0
          }
          echo "Cloudflare cache purged."
