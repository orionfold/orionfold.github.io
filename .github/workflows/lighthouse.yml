name: Lighthouse CI

# M2 — lab performance budgets. DELIBERATELY a separate workflow from
# deploy.yml: it must NEVER gate the prod deploy (golden rule — main ships in
# ~40s, unblocked). A red Lighthouse run flags a perf regression for review; it
# does not stop the site from shipping. Budgets/assertions live in
# .lighthouserc.cjs (mobile + devtools throttling, the 6 D2-baseline pages).

on:
  # Surface regressions right after a deploy, on a weekly cadence, and on demand.
  push:
    branches: [main]
  schedule:
    - cron: '17 7 * * 1' # Mondays 07:17 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lighthouse
  cancel-in-progress: true

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Run Lighthouse CI
        # Direct lhci (runner Chrome; no wrapper action — treosh never ran our
        # rc's filesystem upload, so audit-reports/lhci/ was absent from every
        # artifact). Order is collect → upload → assert so the manifest+reports
        # that scripts/pull-lhci-artifact.mjs consumes exist even when a budget
        # assertion reds the run. The rc (.lighthouserc.cjs) is auto-discovered.
        run: |
          npx --yes @lhci/cli@0.15.1 collect
          npx --yes @lhci/cli@0.15.1 upload
          npx --yes @lhci/cli@0.15.1 assert

      - name: Email regression alert
        # M5 — best-effort: a red budget run emails the operator a digest via
        # the ops-alert edge fn. continue-on-error so a broken alerter never
        # confuses triage of the underlying perf regression.
        if: failure()
        continue-on-error: true
        env:
          OPS_ALERT_TOKEN: ${{ secrets.OPS_ALERT_TOKEN }}
        run: node scripts/notify-lighthouse-alert.mjs

      - name: Upload Lighthouse reports
        if: always() # keep the reports even when a budget assertion fails
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          # BOTH paths are load-bearing: upload-artifact roots the artifact at
          # the least-common-ancestor of all search paths (= repo root), which
          # preserves the audit-reports/lhci/manifest.json prefix that
          # scripts/pull-lhci-artifact.mjs expects. include-hidden-files because
          # .lighthouseci is a dot-dir — v4 silently skips it by default (the
          # original "empty artifact" footgun).
          path: |
            .lighthouseci/
            audit-reports/lhci/
          include-hidden-files: true
          retention-days: 30
          if-no-files-found: warn # `ignore` is how the empty-artifact bug stayed invisible
