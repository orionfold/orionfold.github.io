<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Orionfold — we never say trust us, we say rerun it">
  <defs>
    <radialGradient id="of-og-bg" cx="64%" cy="40%" r="90%">
      <stop offset="0%"   stop-color="#0f3f3d"/>
      <stop offset="52%"  stop-color="#0c2122"/>
      <stop offset="100%" stop-color="#0a1012"/>
    </radialGradient>
  </defs>

  <!-- calm dark-cyan ground -->
  <rect width="1200" height="630" fill="url(#of-og-bg)"/>

  <!-- sparse stars (low-opacity, calm — never a busy field) -->
