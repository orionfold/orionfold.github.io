    <circle cx="980"  cy="120" r="2.5" opacity="0.60"/>
    <circle cx="1066" cy="206" r="1.8" opacity="0.42"/>
    <circle cx="892"  cy="92"  r="1.6" opacity="0.38"/>
    <circle cx="1108" cy="118" r="2.2" opacity="0.50"/>
    <circle cx="1020" cy="300" r="1.5" opacity="0.32"/>
    <circle cx="940"  cy="470" r="1.8" opacity="0.32"/>
    <circle cx="1120" cy="430" r="1.6" opacity="0.30"/>
  </g>

  <!-- brand voice + domain (mono, muted) -->
</svg>
