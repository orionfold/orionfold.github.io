<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 300" role="img" aria-labelledby="title desc">
  <title id="title">One Relay Host connected to ten managed Cells</title>
  <desc id="desc">A Host supervisor branches into two rows of five isolated customer Cells.</desc>
  <defs>
    <linearGradient id="host-fill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12313a"/>
      <stop offset="1" stop-color="#07151c"/>
    </linearGradient>
    <linearGradient id="cell-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b2028"/>
      <stop offset="1" stop-color="#071219"/>
    </linearGradient>
    <filter id="cyan-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <symbol id="cell" viewBox="0 0 76 58">
      <rect x="1" y="1" width="74" height="56" rx="10" fill="url(#cell-fill)" stroke="#1acbc8" stroke-opacity=".58"/>
      <path d="m38 17 10 5.7v11.5L38 40l-10-5.8V22.7L38 17Zm0 0v11.5m10-5.8-10 5.8-10-5.8m10 5.8V40" fill="none" stroke="#39e3df" stroke-width="1.6" stroke-linejoin="round"/>
    </symbol>
  </defs>

  <g class="topology-lines" fill="none" stroke="#27d9d5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M310 86v26H78v31M310 112H194v31M310 112v31M310 112h116v31M310 112h232v31"/>
    <path d="M310 112v99H78v-10M310 211H194v-10M310 211v-10M310 211h116v-10M310 211h232v-10"/>
  </g>

  <g class="topology-host" filter="url(#cyan-glow)">
    <rect x="232" y="10" width="156" height="76" rx="13" fill="url(#host-fill)" stroke="#38e4e0" stroke-width="1.5"/>
    <g fill="none" stroke="#39e3df" stroke-width="1.7">
      <rect x="254" y="29" width="26" height="10" rx="2"/>
      <rect x="254" y="48" width="26" height="10" rx="2"/>
      <path d="M261 34h.1M261 53h.1" stroke-width="3" stroke-linecap="round"/>
    </g>
    <text x="300" y="50" fill="#f1fbfc" font-family="Geist Sans,system-ui,sans-serif" font-size="22" font-weight="600">Host</text>
  </g>

  <g class="topology-cells">
    <use href="#cell" x="40" y="143" width="76" height="58" style="--delay:0ms"/>
    <use href="#cell" x="156" y="143" width="76" height="58" style="--delay:70ms"/>
    <use href="#cell" x="272" y="143" width="76" height="58" style="--delay:140ms"/>
    <use href="#cell" x="388" y="143" width="76" height="58" style="--delay:210ms"/>
    <use href="#cell" x="504" y="143" width="76" height="58" style="--delay:280ms"/>
    <use href="#cell" x="40" y="211" width="76" height="58" style="--delay:350ms"/>
    <use href="#cell" x="156" y="211" width="76" height="58" style="--delay:420ms"/>
    <use href="#cell" x="272" y="211" width="76" height="58" style="--delay:490ms"/>
    <use href="#cell" x="388" y="211" width="76" height="58" style="--delay:560ms"/>
    <use href="#cell" x="504" y="211" width="76" height="58" style="--delay:630ms"/>
  </g>

  <g class="topology-pulses" fill="#4ff6f1">
    <circle cx="78" cy="112" r="2.4" style="--delay:0ms"/>
    <circle cx="194" cy="112" r="2.4" style="--delay:220ms"/>
    <circle cx="310" cy="112" r="2.4" style="--delay:440ms"/>
    <circle cx="426" cy="112" r="2.4" style="--delay:660ms"/>
    <circle cx="542" cy="112" r="2.4" style="--delay:880ms"/>
  </g>

  <style>
    .topology-lines { stroke-dasharray: 840; stroke-dashoffset: 840; animation: draw 1.6s cubic-bezier(.16,1,.3,1) .15s forwards; opacity:.68 }
    .topology-host { transform-origin:310px 48px; animation: host-in .7s cubic-bezier(.16,1,.3,1) both }
    .topology-cells use { opacity:0; animation: cell-in .55s cubic-bezier(.16,1,.3,1) calc(.55s + var(--delay)) forwards }
    .topology-pulses circle { opacity:0; animation: pulse 2.4s ease-in-out calc(1.2s + var(--delay)) infinite }
    @keyframes draw { to { stroke-dashoffset:0 } }
    @keyframes host-in { from { opacity:0; transform:translateY(-8px) scale(.94) } to { opacity:1; transform:none } }
    @keyframes cell-in { from { opacity:0; transform:translateY(7px) } to { opacity:1; transform:none } }
    @keyframes pulse { 0%,100% { opacity:0; transform:scale(.6) } 42% { opacity:1; transform:scale(1.5) } 70% { opacity:.3; transform:scale(1) } }
    @media (prefers-reduced-motion:reduce) {
      .topology-lines { stroke-dashoffset:0; animation:none }
      .topology-host,.topology-cells use,.topology-pulses circle { opacity:1; animation:none; transform:none }
    }
  </style>
</svg>
