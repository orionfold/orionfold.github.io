<svg viewBox="0 0 640 220" role="img" aria-label="Horizontal bar chart of the Patent Strategist's score on patent multiple-choice questions under three context modes. Closed-book with no help scores 62.5 percent, with retrieval 85 percent, with the gold passage 95 percent." xmlns="http://www.w3.org/2000/svg">
<title>Patent multiple-choice score by how much context the model is given</title>
<!-- vertical gridlines at quarters of the plot area (plot x: 200..610, scale 0..115) -->
<line x1="302.5" y1="24" x2="302.5" y2="184" stroke="#9aa1ab" stroke-width="0.75" opacity="0.18"/>
<line x1="405" y1="24" x2="405" y2="184" stroke="#9aa1ab" stroke-width="0.75" opacity="0.18"/>
<line x1="507.5" y1="24" x2="507.5" y2="184" stroke="#9aa1ab" stroke-width="0.75" opacity="0.18"/>
<line x1="610" y1="24" x2="610" y2="184" stroke="#9aa1ab" stroke-width="0.75" opacity="0.18"/>
<!-- y axis -->
<line x1="200" y1="24" x2="200" y2="184" stroke="#9aa1ab" stroke-width="1.25"/>
<!-- with gold passage (best, cyan): 95 of 115 = 338.7px, bar ends 538.7 -->
<rect x="200" y="36" width="338.7" height="34" rx="3" fill="#14c8c0"><title>With the gold passage — 95%</title></rect>
<text x="192" y="58" text-anchor="end" font-size="13" fill="#0e9e98" font-weight="600">With gold passage</text>
<text x="548" y="58" font-size="13" fill="#0e9e98" font-weight="600">95%</text>
<!-- with retrieval: 85 of 115 = 303.0px -->
<rect x="200" y="84" width="303.0" height="34" rx="3" fill="#3fd55a"><title>With retrieval — 85%</title></rect>
<text x="192" y="106" text-anchor="end" font-size="13" fill="#6b7280">With retrieval</text>
<text x="513" y="106" font-size="13" fill="#6b7280">85%</text>
<!-- closed book: 62.5 of 115 = 222.8px -->
<rect x="200" y="132" width="222.8" height="34" rx="3" fill="#3fd55a"><title>Closed book, no help — 62.5%</title></rect>
<text x="192" y="154" text-anchor="end" font-size="13" fill="#6b7280">Closed book, no help</text>
<text x="433" y="154" font-size="13" fill="#6b7280">62.5%</text>
</svg>
