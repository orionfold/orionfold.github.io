<svg viewBox="0 0 640 220" role="img" aria-label="Horizontal bar chart of pass rate for each model. Advisor 4B local leads at 86 percent, glm-4.6 at 81 percent, claude-opus-4-8 at 76 percent." xmlns="http://www.w3.org/2000/svg">
<title>Pass rate by model</title>
