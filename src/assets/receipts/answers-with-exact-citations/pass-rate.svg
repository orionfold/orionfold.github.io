<line x1="405" y1="24" x2="405" y2="184" stroke="#9aa1ab" stroke-width="0.75" opacity="0.18"/>
<line x1="507.5" y1="24" x2="507.5" y2="184" stroke="#9aa1ab" stroke-width="0.75" opacity="0.18"/>
